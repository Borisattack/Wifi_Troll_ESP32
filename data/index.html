<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Wi-Fi</title>
    <style>
        body {
            background-color: #000;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            margin-top: 50px;
        }
        img {
            max-width: 90%;
            height: auto;
            border: 5px solid red;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Tu t'attendais à du Wi-Fi gratuit ?</h1>
    <img src="/troll.jpg" alt="Troll Face">
    <script>
        // Request notification permission and show a notification
        if ('Notification' in window) {
            Notification.requestPermission().then(function(permission) {
                if (permission === 'granted') {
                    var notification = new Notification('Fake Wi-Fi Connected!', {
                        body: 'You are connected to FunnyFakeWifi. Click to view the portal.',
                        icon: '/troll.jpg'
                    });
                    notification.onclick = function() {
                        window.focus();
                        notification.close();
                    };
                }
            });
        }
    </script>
</body>
</html>
